name: Build GhostVpn
on:
  push: { branches: [main, master] }
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: signvpn }

      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Clone & patch sing-box libs
        run: |
          git clone --depth 1 https://github.com/SagerNet/sing-box.git /tmp/sing-box
          cp -r ${{ github.workspace }}/signvpn/protocol/* /tmp/sing-box/protocol/
          bash ${{ github.workspace }}/signvpn/scripts/patch-singbox.sh

      - name: Build libbox AAR
        run: |
          cd /tmp/sing-box
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          gomobile bind -v -target=android/arm64 -androidapi 21 \
            -javapkg io.nekohasekai \
            -tags="with_quic,with_utls,with_clash_api,with_gvisor,with_dhcp" \
            -o ${{ github.workspace }}/signvpn/android/app/libs/libbox.aar \
            github.com/sagernet/sing-box/experimental/libbox

      - name: Build GhostVpn APK
        run: |
          cd ${{ github.workspace }}/signvpn/android
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: GhostVpn-APK
          path: ${{ github.workspace }}/signvpn/android/app/build/outputs/apk/debug/*.apk
