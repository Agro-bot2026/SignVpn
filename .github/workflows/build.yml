name: Build GhostVpn
on:
  push: { branches: [main, master] }
  workflow_dispatch:
env:
  ANDROID_SDK_ROOT: /opt/android-sdk
  ANDROID_HOME: /opt/android-sdk
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: ghostvpn }

      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }

      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Clone sing-box
        run: |
          git clone --depth 1 https://github.com/SagerNet/sing-box.git /tmp/sing-box
          cp -r ${{ github.workspace }}/ghostvpn/protocol/* /tmp/sing-box/protocol/
          bash ${{ github.workspace }}/ghostvpn/scripts/patch-singbox.sh

      - name: Build AAR
        run: |
          cd /tmp/sing-box
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          gomobile bind -v -target=android/arm64 -androidapi 21 \
            -javapkg io.nekohasekai \
            -tags="with_quic,with_utls,with_clash_api,with_gvisor,with_dhcp" \
            -o /tmp/libbox.aar \
            github.com/sagernet/sing-box/experimental/libbox

      - name: Create GhostVpn project
        run: |
          mkdir -p /tmp/ghostvpn/app/libs /tmp/ghostvpn/app/src/main/java/com/ghostvpn
          mkdir -p /tmp/ghostvpn/app/src/main/res/layout /tmp/ghostvpn/app/src/main/res/values
          mkdir -p /tmp/ghostvpn/app/src/main/res/drawable /tmp/ghostvpn/app/src/main/res/xml
          mkdir -p /tmp/ghostvpn/gradle/wrapper
          cp /tmp/libbox.aar /tmp/ghostvpn/app/libs/
          cp ${{ github.workspace }}/ghostvpn/android/app/src/main/res/drawable/ghostvpn_icon.png \
             /tmp/ghostvpn/app/src/main/res/drawable/ 2>/dev/null || true

      - name: Write project files
        run: |
          # settings.gradle
          cat > /tmp/ghostvpn/settings.gradle.kts << 'SETTINGS'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "GhostVpn"; include(":app")
          SETTINGS

          # Root build.gradle
          cat > /tmp/ghostvpn/build.gradle.kts << 'BUILD'
          plugins { id("com.android.application") version "8.2.0" apply false; id("org.jetbrains.kotlin.android") version "1.9.20" apply false }
          BUILD

          # App build.gradle
          cat > /tmp/ghostvpn/app/build.gradle.kts << 'APPBUILD'
          plugins { id("com.android.application"); id("org.jetbrains.kotlin.android") }
          android {
              namespace = "com.ghostvpn"; compileSdk = 34
              defaultConfig { applicationId = "com.ghostvpn"; minSdk = 21; targetSdk = 34; versionCode = 1; versionName = "1.0" }
              compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies {
              implementation(fileTree(mapOf("dir" to "libs", "include" to listOf("*.aar"))))
              implementation("androidx.appcompat:appcompat:1.6.1"); implementation("androidx.core:core-ktx:1.12.0")
              implementation("com.google.android.material:material:1.11.0")
              implementation("androidx.preference:preference-ktx:1.2.1"); implementation("com.google.code.gson:gson:2.10.1")
          }
          APPBUILD

          # AndroidManifest
          cat > /tmp/ghostvpn/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.ghostvpn">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <application android:allowBackup="true" android:label="GhostVpn"
                  android:icon="@drawable/ghostvpn_icon" android:supportsRtl="true"
                  android:theme="@style/Theme.GhostVpn" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:configChanges="orientation|screenSize">
                      <intent-filter><action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
                  <service android:name=".TunnelService" android:exported="false"
                      android:foregroundServiceType="dataSync"/>
              </application>
          </manifest>
          MANIFEST

          # themes
          cat > /tmp/ghostvpn/app/src/main/res/values/themes.xml << 'THEMES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.GhostVpn" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">#FF6A00</item>
                  <item name="colorSurface">#1A1A2E</item>
                  <item name="colorOnSurface">#E0E0E0</item>
                  <item name="android:colorBackground">#0F0F23</item>
              </style>
          </resources>
          THEMES

          # strings
          cat > /tmp/ghostvpn/app/src/main/res/values/strings.xml << 'STRINGS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">GhostVpn</string></resources>
          STRINGS

          # gradle.properties
          cat > /tmp/ghostvpn/gradle.properties << 'PROPS'
          org.gradle.jvmargs=-Xmx2048m; android.useAndroidX=true
          PROPS

          # wrapper
          cat > /tmp/ghostvpn/gradle/wrapper/gradle-wrapper.properties << 'WRAPPER'
          distributionBase=GRADLE_USER_HOME; distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          networkTimeout=10000; validateDistributionUrl=true; zipStoreBase=GRADLE_USER_HOME; zipStorePath=wrapper/dists
          WRAPPER

      - name: Write MainActivity.kt
        run: |
          cat > /tmp/ghostvpn/app/src/main/java/com/ghostvpn/MainActivity.kt << 'KOTLIN'
          package com.ghostvpn
          import android.content.*; import android.net.Uri; import android.os.*
          import android.widget.*; import androidx.appcompat.app.AppCompatActivity
          import androidx.appcompat.app.AppCompatDelegate
          import com.google.gson.Gson; import io.nekohasekai.libbox.Libbox
          data class Profile(val name: String="Default", val server: String="", val port: Int=80,
              val user: String="", val password: String="", val payload: String="", val sni: String="",
              val socksPort: Int=1080, val badvpnEnabled: Boolean=false, val badvpnPort: Int=7300,
              val dns: String="8.8.8.8", val autoReconnect: Boolean=false)
          class MainActivity : AppCompatActivity() {
              companion object { const val PREFS = "ghostvpn"; const val EXPORT=1001; const val IMPORT=1002 }
              private lateinit var etServer: EditText; private lateinit var etPort: EditText
              private lateinit var etUser: EditText; private lateinit var etPass: EditText
              private lateinit var etPayload: EditText; private lateinit var etSNI: EditText
              private lateinit var statusText: TextView; private lateinit var logText: TextView
              private lateinit var btnConnect: Button; private lateinit var etDNS: EditText
              private lateinit var swBadVPN: Switch; private lateinit var swReconnect: Switch
              private var isRunning = false
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  val prefs = getSharedPreferences(PREFS, MODE_PRIVATE)
                  if (prefs.getBoolean("dark", true)) AppCompatDelegate.setDefaultNightMode(AppCompatDelegate.MODE_NIGHT_YES)
                  val scroll = ScrollView(this); val l = LinearLayout(this).apply { orientation=1; setPadding(16,16,16,16) }
                  // Header con botones export/import
                  val h = LinearLayout(this).apply { orientation=0 }
                  h.addView(TextView(this).apply { text="GhostVpn"; textSize=22f })
                  h.addView(Button(this).apply { text="Exportar"; setOnClickListener{exportProfile()} })
                  h.addView(Button(this).apply { text="Importar"; setOnClickListener{importProfile()} })
                  l.addView(h)
                  fun fld(label:String, hint:String, def:String="", multi:Boolean=false):EditText {
                      l.addView(TextView(this).apply{text=label;textSize=13f})
                      val e=EditText(this).apply{setHint(hint);setText(def);if(multi){minLines=3;maxLines=6}}
                      l.addView(e); return e
                  }
                  etServer=fld("Servidor","IP","149.33.19.164"); etPort=fld("Puerto","80","80")
                  val cr=LinearLayout(this).apply{orientation=0}
                  etUser=EditText(this).apply{hint="Usuario";setText("Charly100");layoutParams=LinearLayout.LayoutParams(0,-2,1f)}
                  etPass=EditText(this).apply{hint="Contraseña";inputType=android.text.InputType.TYPE_TEXT_VARIATION_PASSWORD;layoutParams=LinearLayout.LayoutParams(0,-2,1f)}
                  cr.addView(etUser); cr.addView(etPass)
                  l.addView(TextView(this).apply{text="Credenciales SSH";textSize=13f})
                  l.addView(cr)
                  etPayload=fld("Payload","CONNECT /...","",true)
                  etSNI=fld("SNI / Host","SNI opcional")
                  // BadVPN
                  val bv=LinearLayout(this).apply{orientation=0}
                  swBadVPN=Switch(this).apply{text="BadVPN"}
                  val etBVP=EditText(this).apply{hint="7300";setText("7300");inputType=android.text.InputType.TYPE_CLASS_NUMBER;layoutParams=LinearLayout.LayoutParams(0,-2,1f)}
                  bv.addView(swBadVPN); bv.addView(etBVP)
                  l.addView(TextView(this).apply{text="BadVPN UDPGW";textSize=13f}); l.addView(bv)
                  // DNS
                  val dnsVals=arrayOf("Google 8.8.8.8","Cloudflare 1.1.1.1","OpenDNS 208.67.222.222","Quad9 9.9.9.9","Personalizado")
                  val spDNS=Spinner(this).apply{adapter=ArrayAdapter(this,android.R.layout.simple_spinner_dropdown_item,dnsVals)}
                  etDNS=EditText(this).apply{hint="DNS";setText("8.8.8.8")}
                  l.addView(TextView(this).apply{text="DNS";textSize=13f}); l.addView(spDNS); l.addView(etDNS)
                  spDNS.setOnItemSelectedListener(object:AdapterView.OnItemSelectedListener{
                      override fun onItemSelected(p:AdapterView<*>?,v:android.view.View?,pos:Int,id:Long){
                          etDNS.setText(arrayOf("8.8.8.8","1.1.1.1","208.67.222.222","9.9.9.9","8.8.8.8")[pos])}
                      override fun onNothingSelected(p:AdapterView<*>?){}
                  })
                  // Auto-reconnect
                  swReconnect=Switch(this).apply{text="Auto-reconexión"}
                  l.addView(swReconnect)
                  // Status + button
                  statusText=TextView(this).apply{text="⏸ Desconectado";textSize=16f;textAlignment=TextView.TEXT_ALIGNMENT_CENTER;setPadding(0,16,0,16)}
                  l.addView(statusText)
                  btnConnect=Button(this).apply{text="CONECTAR"}
                  btnConnect.setOnClickListener{
                      if(!isRunning){conectar()}else{desconectar()}
                  }
                  l.addView(btnConnect)
                  // Log
                  l.addView(TextView(this).apply{text="Log:";textSize=12f})
                  val ls=ScrollView(this).apply{layoutParams=LinearLayout.LayoutParams(-1,400)}
                  logText=TextView(this).apply{textSize=10f}; ls.addView(logText); l.addView(ls)
                  l.addView(Button(this).apply{text="Limpiar";setOnClickListener{logText.text=""}})
                  scroll.addView(l); setContentView(scroll)
              }
              private fun conectar(){
                  val s=etServer.text.toString(); val p=etPort.text.toString().toIntOrNull()?:80
                  val u=etUser.text.toString(); val pw=etPass.text.toString(); val pl=etPayload.text.toString()
                  val sp=1080
                  if(s.isEmpty()||u.isEmpty()||pw.isEmpty()){Toast.makeText(this,"Completá los campos",0).show();return}
                  isRunning=true; btnConnect.text="DESCONECTAR"; statusText.text="🔌 Conectando..."
                  logText.append("\n🔄 Conectando a $s:$p...\n")
                  Thread{
                      try{
                          val err=Libbox.startHTTPCustomTunnel(s,p,u,pw,pl,sp)
                          runOnUiThread{
                              if(err!=null){logText.append("❌ $err\n");reset()}
                              else{logText.append("✅ Conectado SOCKS5 127.0.0.1:$sp\n");statusText.text="✅ Conectado"}
                          }
                      }catch(e:Exception){runOnUiThread{logText.append("❌ ${e.message}\n");reset()}}
                  }.start()
              }
              private fun desconectar(){logText.append("⏹ Deteniendo...\n");Thread{Libbox.stopHTTPCustomTunnel();runOnUiThread{reset()}}.start()}
              private fun reset(){isRunning=false;btnConnect.text="CONECTAR";statusText.text="⏸ Desconectado"}
              private fun exportProfile(){
                  val p=Profile(server=etServer.text.toString(),port=etPort.text.toString().toIntOrNull()?:80,user=etUser.text.toString(),password=etPass.text.toString(),
                      payload=etPayload.text.toString(),sni=etSNI.text.toString(),badvpnEnabled=swBadVPN.isChecked,dns=etDNS.text.toString(),autoReconnect=swReconnect.isChecked)
                  val j=Gson().toJson(p)
                  startActivityForResult(Intent(Intent.ACTION_CREATE_DOCUMENT).apply{addCategory(Intent.CATEGORY_OPENABLE);type="application/json";putExtra(Intent.EXTRA_TITLE,"ghostvpn.json")},EXPORT)
                  getSharedPreferences(PREFS,MODE_PRIVATE).edit().putString("export",j).apply()
              }
              private fun importProfile(){startActivityForResult(Intent(Intent.ACTION_OPEN_DOCUMENT).apply{addCategory(Intent.CATEGORY_OPENABLE);type="application/json"},IMPORT)}
              override fun onActivityResult(r:Int,rc:Int,d:Intent?){
                  super.onActivityResult(r,rc,d)
                  if(rc!=RESULT_OK||d==null)return
                  if(r==EXPORT){val j=getSharedPreferences(PREFS,MODE_PRIVATE).getString("export","")
                      try{contentResolver.openOutputStream(d.data!!)!!.write(j?.toByteArray())}catch(e:Exception){}}
                  if(r==IMPORT){try{
                      val p=Gson().fromJson(contentResolver.openInputStream(d.data!!)!!.bufferedReader().readText(),Profile::class.java)
                      etServer.setText(p.server);etPort.setText(p.port.toString());etUser.setText(p.user);etPass.setText(p.password)
                      etPayload.setText(p.payload);etSNI.setText(p.sni);etDNS.setText(p.dns);swBadVPN.isChecked=p.badvpnEnabled;swReconnect.isChecked=p.autoReconnect
                  }catch(e:Exception){}}
              }
          }
          KOTLIN

      - name: Write TunnelService.kt
        run: |
          cat > /tmp/ghostvpn/app/src/main/java/com/ghostvpn/TunnelService.kt << 'KOTLIN'
          package com.ghostvpn
          import android.app.*; import android.content.Intent; import android.os.IBinder
          import androidx.core.app.NotificationCompat
          class TunnelService : Service() {
              companion object { const val CHAN="ghostvpn"; const val NID=1 }
              override fun onCreate(){super.onCreate();createChan();startForeground(NID,note("GhostVpn activo"))}
              override fun onStartCommand(i:Intent?,f:Int,s:Int)=START_STICKY
              override fun onDestroy(){super.onDestroy()}
              override fun onBind(i:Intent?):IBinder?=null
              private fun createChan(){(getSystemService(NOTIFICATION_SERVICE) as NotificationManager).createNotificationChannel(
                  NotificationChannel(CHAN,"GhostVpn",NotificationManager.IMPORTANCE_LOW))}
              private fun note(t:String)=NotificationCompat.Builder(this,CHAN).setContentTitle("GhostVpn").setContentText(t)
                  .setSmallIcon(android.R.drawable.ic_menu_share).setOngoing(true).build()
          }
          KOTLIN

      - name: Setup Gradle
        run: |
          cd /tmp/ghostvpn
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/g.zip
          unzip -q /tmp/g.zip -d /tmp/g; /tmp/g/gradle-8.5/bin/gradle wrapper --gradle-version 8.5

      - name: Build APK
        run: cd /tmp/ghostvpn && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: GhostVpn-APK
          path: /tmp/ghostvpn/app/build/outputs/apk/debug/*.apk
