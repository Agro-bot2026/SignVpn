name: Build GhostVpn
on:
  push: { branches: [main, master] }
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Clone sing-box + patch
        run: |
          git clone --depth 1 https://github.com/SagerNet/sing-box.git /tmp/sing-box
          cp -r protocol/* /tmp/sing-box/protocol/
          bash scripts/patch-singbox.sh

      - name: Build AAR
        run: |
          cd /tmp/sing-box
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          go get -tool golang.org/x/mobile/cmd/gobind
          gomobile init
          gomobile bind -v -target=android/arm64 -androidapi 21 \
            -javapkg io.nekohasekai \
            -tags="with_quic,with_utls,with_clash_api,with_gvisor,with_dhcp" \
            -o /tmp/libbox.aar \
            github.com/sagernet/sing-box/experimental/libbox

      - name: Setup GhostVpn project
        run: |
          mkdir -p /tmp/ghostvpn
          cp -r ghostvpn/* /tmp/ghostvpn/
          mkdir -p /tmp/ghostvpn/app/libs
          cp /tmp/libbox.aar /tmp/ghostvpn/app/libs/
          cd /tmp/ghostvpn
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle8.zip
          unzip -q /tmp/gradle8.zip -d /tmp/gradle8
          /tmp/gradle8/gradle-8.5/bin/gradle wrapper --gradle-version 8.5

      - name: Build APK
        run: |
          cd /tmp/ghostvpn
          ls -la gradlew 2>/dev/null || {
            curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/g8.zip
            unzip -q /tmp/g8.zip -d /tmp/g8
            /tmp/g8/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          }
          chmod +x gradlew
          export JAVA_HOME=$JAVA_HOME_17_X64
          ./gradlew assembleDebug --stacktrace 2>&1 | tail -30

      - uses: actions/upload-artifact@v4
        with:
          name: GhostVpn-APK
          path: /tmp/ghostvpn/app/build/outputs/apk/debug/*.apk
