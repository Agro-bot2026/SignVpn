name: Build SingVPN APK/AAB
on:
  push: { branches: [main, master] }
  workflow_dispatch:
env:
  ANDROID_SDK_ROOT: /opt/android-sdk
  ANDROID_HOME: /opt/android-sdk
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: signvpn }

      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }

      - uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Clone sing-box core
        run: |
          git clone --depth 1 https://github.com/SagerNet/sing-box.git /tmp/sing-box
          cp -r ${{ github.workspace }}/signvpn/protocol/* /tmp/sing-box/protocol/

      - name: Clone sing-box-for-android
        run: git clone --depth 1 --recurse-submodules --shallow-submodules https://github.com/SagerNet/sing-box-for-android.git /tmp/sb-android

      - name: Setup gomobile
        run: |
          cd /tmp/sing-box
          go get -tool golang.org/x/mobile/cmd/gobind
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Patch sing-box for Go 1.25
        run: bash ${{ github.workspace }}/signvpn/scripts/patch-singbox.sh

      - name: Build AARs
        run: |
          mkdir -p /tmp/sb-android/app/libs
          cd /tmp/sing-box
          # Build normal AAR (used by play + other flavors, minSdk 23)
          gomobile bind -v -target=android/arm64 \
            -androidapi 23 \
            -javapkg io.nekohasekai \
            -tags="with_quic,with_utls,with_clash_api,with_gvisor,with_dhcp" \
            -o /tmp/sb-android/app/libs/libbox.aar \
            github.com/sagernet/sing-box/experimental/libbox
          # Build legacy AAR (used by otherLegacy flavor, minSdk 21)
          gomobile bind -v -target=android/arm64 \
            -androidapi 21 \
            -javapkg io.nekohasekai \
            -tags="with_quic,with_utls,with_clash_api,with_gvisor,with_dhcp" \
            -o /tmp/sb-android/app/libs/libbox-legacy.aar \
            github.com/sagernet/sing-box/experimental/libbox

      - name: Customize app icon and name
        run: |
          # Copy GhostVpn icon
          cp ${{ github.workspace }}/signvpn/android/app/src/main/res/drawable/ghostvpn_icon.png \
             /tmp/sb-android/app/src/main/res/drawable/ghostvpn_icon.png 2>/dev/null || true
          # Change app label and icon in AndroidManifest
          sed -i 's/android:label="[^"]*"/android:label="GhostVpn"/' /tmp/sb-android/app/src/main/AndroidManifest.xml
          sed -i 's|android:icon="[^"]*"|android:icon="@drawable/ghostvpn_icon"|' /tmp/sb-android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd /tmp/sb-android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build AAB
        run: |
          cd /tmp/sb-android
          ./gradlew bundleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: SingVPN-APK
          path: /tmp/sb-android/app/build/outputs/apk/**/debug/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: SingVPN-AAB
          path: /tmp/sb-android/app/build/outputs/bundle/**/debug/*.aab
